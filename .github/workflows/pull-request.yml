name: PR

on:
  pull_request:
    branches:
      - main
  push:

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up mise (aube + Node)
        uses: jdx/mise-action@v2

      - name: Install dependencies
        run: aube ci

      - name: Lint
        run: aube run lint

      - name: Test
        run: aube test
