name: Quality

on:
  pull_request:
    branches:
      - main
  push:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up mise (aube + Node)
        uses: jdx/mise-action@v2

      - name: Install dependencies
        run: aube ci

      - name: Lint and test
        run: |
          aube run lint
          aube run test
