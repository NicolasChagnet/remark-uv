name: Release

permissions:
  contents: read
  id-token: write

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up mise (aube + Node)
        uses: jdx/mise-action@v2

      - name: Upgrade npm # ← add this
        run: npm install -g npm@latest

      - name: Install dependencies
        run: aube ci

      - name: Lint, Test and Build
        run: |
          aube run lint
          aube run test
          aube run build

      - name: Publish to npm
        run: npm publish --access public --loglevel verbose
